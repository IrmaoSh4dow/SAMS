<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ST. Fiacre Hospital | Gestión de Personal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de gestión de personal médico del ST. Fiacre Hospital">

    <!-- Fuentes modernas -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Variables CSS - Misma paleta que el index */
        :root {
            --primary: #2D9CDB;
            --secondary: #27AE60;
            --accent: #EB5757;
            --light: #F8F9FA;
            --light-blue: #E3F2FD;
            --light-green: #E8F5E9;
            --dark: #2C3E50;
            --gray: #95A5A6;
            --border-radius: 16px;
            --border-radius-sm: 12px;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 15px 40px rgba(0, 0, 0, 0.12);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--light);
            color: var(--dark);
            overflow-x: hidden;
        }

        /* ==================== NAVBAR MODERNA ==================== */
        .navbar {
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0 20px;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 0;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            text-decoration: none;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo i {
            font-size: 1.8rem;
        }

        .nav-links {
            display: flex;
            gap: 5px;
        }

        .nav-links a {
            padding: 10px 18px;
            font-weight: 500;
            color: var(--dark);
            border-radius: 50px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .nav-links a i {
            font-size: 1rem;
        }

        .nav-links a:hover {
            background: var(--light-blue);
            color: var(--primary);
        }

        .nav-links a.active {
            background: var(--light-blue);
            color: var(--primary);
            font-weight: 600;
        }

        .user-menu {
            position: relative;
        }

        .user-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--light);
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-family: inherit;
        }

        .user-btn:hover {
            background: var(--light-blue);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .user-info {
            text-align: right;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--dark);
        }

        .user-role {
            font-size: 0.7rem;
            color: var(--gray);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 10px;
            background: white;
            border-radius: var(--border-radius-sm);
            box-shadow: var(--shadow-hover);
            min-width: 220px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: var(--transition);
            z-index: 1000;
        }

        .user-menu.active .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--dark);
            text-decoration: none;
            transition: var(--transition);
            border-bottom: 1px solid #eee;
        }

        .dropdown-menu a:last-child {
            border-bottom: none;
        }

        .dropdown-menu a:hover {
            background: var(--light-blue);
            color: var(--primary);
        }

        .dropdown-menu a i {
            width: 20px;
            color: var(--primary);
        }

        .dropdown-divider {
            height: 1px;
            background: #eee;
            margin: 5px 0;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--primary);
            cursor: pointer;
            transition: var(--transition);
        }

        .mobile-menu-btn:hover {
            transform: rotate(90deg);
        }

        /* ==================== CONTENIDO PRINCIPAL ==================== */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 1.8rem;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-header h1 i {
            color: var(--primary);
        }

        .page-header p {
            color: var(--gray);
            margin-top: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(45, 156, 219, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .btn-danger {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.8rem;
        }

        .btn-danger:hover {
            background: var(--accent);
            color: white;
        }

        /* Filtros */
        .filters-section {
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-family: inherit;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .filter-group {
            display: flex;
            gap: 10px;
        }

        .filter-select {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-family: inherit;
            background: white;
            cursor: pointer;
        }

        /* Grid de personal */
        .staff-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .staff-card {
            background: white;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .staff-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .card-header-image {
            height: 140px;
            background: linear-gradient(135deg, var(--light-blue), #fff);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staff-silhouette {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .staff-silhouette i {
            font-size: 3.2rem;
            color: white;
        }

        .staff-status {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .status-active {
            background-color: var(--secondary);
            box-shadow: 0 0 8px var(--secondary);
        }

        .status-off {
            background-color: var(--gray);
        }

        .card-content {
            padding: 20px;
        }

        .staff-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 5px;
        }

        .staff-role {
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .staff-info-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--gray);
        }

        .info-item i {
            color: var(--primary);
            width: 14px;
            font-size: 0.8rem;
        }

        .staff-specialty {
            background: var(--light);
            padding: 8px 12px;
            border-radius: var(--border-radius-sm);
            margin: 12px 0;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .staff-specialty i {
            color: var(--primary);
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }

        .card-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-view {
            background: var(--light-blue);
            color: var(--primary);
        }
        .btn-view:hover { background: var(--primary); color: white; }
        .btn-edit { background: #f0f0f0; color: var(--gray); }
        .btn-edit:hover { background: var(--secondary); color: white; }

        /* Paginación */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: white;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }

        .page-btn:hover {
            background: var(--light-blue);
        }

        .page-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: var(--border-radius);
            max-width: 500px;
            width: 90%;
            padding: 30px;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content h3 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--dark);
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: var(--border-radius-sm);
            font-family: inherit;
            transition: var(--transition);
        }

        .modal-content input:focus,
        .modal-content select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .footer {
            background: white;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #e0e0e0;
            margin-top: 40px;
        }

        .footer p {
            font-size: 0.8rem;
            color: var(--gray);
        }

        @media (max-width: 768px) {
            .mobile-menu-btn { display: block; }
            .nav-links {
                position: fixed;
                top: 70px;
                left: 0;
                right: 0;
                background: white;
                flex-direction: column;
                padding: 20px;
                transform: translateY(-100%);
                opacity: 0;
                visibility: hidden;
                transition: var(--transition);
                z-index: 999;
            }
            .nav-links.active {
                transform: translateY(0);
                opacity: 1;
                visibility: visible;
            }
            .filters-section { flex-direction: column; align-items: stretch; }
            .filter-group { justify-content: space-between; }
            .filter-select { flex: 1; }
            .staff-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="dashboard.html" class="logo"><i class="fas fa-heartbeat"></i> ST. Fiacre</a>

                </button>
                <div class="dropdown-menu">

        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1><i class="fas fa-user-md"></i> Gestión de Personal</h1>
                <p>Equipo médico y administrativo del ST. Fiacre Hospital</p>
            </div>
            <button class="btn-primary" id="newStaffBtn"><i class="fas fa-plus-circle"></i> Nuevo Personal</button>
        </div>

        <div class="filters-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar por nombre, especialidad o cargo...">
            </div>
            <div class="filter-group">
                <select class="filter-select" id="roleFilter">
                    <option value="all">Todos los cargos</option>
                    <option value="Médico">Médico</option>
                    <option value="Enfermero/a">Enfermero/a</option>
                    <option value="Paramédico">Paramédico</option>
                    <option value="Administrativo">Administrativo</option>
                </select>
                <select class="filter-select" id="statusFilter">
                    <option value="all">Todos los estados</option>
                    <option value="active">Activo</option>
                    <option value="off">Fuera de servicio</option>
                </select>
            </div>
        </div>

        <div class="staff-grid" id="staffGrid"></div>
        <div class="pagination" id="pagination"></div>
    </main>

    <footer class="footer">
        <p><i class="fas fa-heartbeat" style="color: var(--primary);"></i> ST. Fiacre Hospital - Sistema de Gestión Médica v2.0</p>
    </footer>

    <!-- Modal para nuevo/editar personal -->
    <div class="modal" id="staffModal">
        <div class="modal-content">
            <h3 id="modalTitle"><i class="fas fa-user-plus"></i> Nuevo Personal</h3>
            <input type="text" id="modalName" placeholder="Nombre completo" required>
            <select id="modalRole">
                <option value="Médico">Médico</option>
                <option value="Enfermero/a">Enfermero/a</option>
                <option value="Paramédico">Paramédico</option>
                <option value="Administrativo">Administrativo</option>
            </select>
            <input type="text" id="modalSpecialty" placeholder="Especialidad (ej: Cardiología, Traumatología, etc.)">
            <select id="modalStatus">
                <option value="active">Activo</option>
                <option value="off">Fuera de servicio</option>
            </select>
            <div class="modal-buttons">
                <button class="btn-outline" id="closeModalBtn">Cancelar</button>
                <button class="btn-primary" id="saveStaffBtn">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        // Datos de personal
        let staff = [
            { id: 1, name: 'Dr. Juan Martínez', role: 'Médico', specialty: 'Emergencias', status: 'active', hireDate: '2023-01-15', phone: '555-0101', email: 'j.martinez@stfiacre.ls' },
            { id: 2, name: 'Dra. María López', role: 'Médico', specialty: 'Traumatología', status: 'active', hireDate: '2023-02-20', phone: '555-0102', email: 'm.lopez@stfiacre.ls' },
            { id: 3, name: 'Dr. Carlos Rodríguez', role: 'Médico', specialty: 'Cirugía General', status: 'active', hireDate: '2022-11-10', phone: '555-0103', email: 'c.rodriguez@stfiacre.ls' },
            { id: 4, name: 'Dra. Ana García', role: 'Médico', specialty: 'Psicología', status: 'active', hireDate: '2023-03-05', phone: '555-0104', email: 'a.garcia@stfiacre.ls' },
            { id: 5, name: 'Enf. Laura Fernández', role: 'Enfermero/a', specialty: 'Urgencias', status: 'active', hireDate: '2023-01-20', phone: '555-0105', email: 'l.fernandez@stfiacre.ls' },
            { id: 6, name: 'Enf. Roberto Sánchez', role: 'Enfermero/a', specialty: 'Cuidados Intensivos', status: 'active', hireDate: '2022-12-01', phone: '555-0106', email: 'r.sanchez@stfiacre.ls' },
            { id: 7, name: 'Param. Miguel Torres', role: 'Paramédico', specialty: 'Emergencias Prehospitalarias', status: 'active', hireDate: '2023-02-10', phone: '555-0107', email: 'm.torres@stfiacre.ls' },
            { id: 8, name: 'Param. Silvia Ramírez', role: 'Paramédico', specialty: 'Rescate', status: 'off', hireDate: '2023-01-05', phone: '555-0108', email: 's.ramirez@stfiacre.ls' },
            { id: 9, name: 'Admin. Patricia Mendoza', role: 'Administrativo', specialty: 'Gestión Hospitalaria', status: 'active', hireDate: '2022-10-15', phone: '555-0109', email: 'p.mendoza@stfiacre.ls' },
            { id: 10, name: 'Admin. Fernando Ortiz', role: 'Administrativo', specialty: 'Recursos Humanos', status: 'active', hireDate: '2023-01-25', phone: '555-0110', email: 'f.ortiz@stfiacre.ls' }
        ];

        let currentPage = 1;
        let editingStaffId = null;
        const itemsPerPage = 6;

        function getUserData() {
            const savedUser = localStorage.getItem('sams_user') || sessionStorage.getItem('sams_user');
            if (savedUser) {
                try {
                    const user = JSON.parse(savedUser);
                    document.getElementById('userName').textContent = user.name;
                    document.getElementById('userRole').textContent = user.role;
                    const avatar = document.getElementById('userAvatar');
                    avatar.innerHTML = user.name.charAt(0) + (user.name.charAt(user.name.indexOf(' ') + 1) || '');
                } catch(e) {}
            }
        }

        function getRoleIcon(role) {
            if (role === 'Médico') return 'fas fa-stethoscope';
            if (role === 'Enfermero/a') return 'fas fa-hand-holding-heart';
            if (role === 'Paramédico') return 'fas fa-ambulance';
            return 'fas fa-clipboard-list';
        }

        function renderStaff() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const roleFilter = document.getElementById('roleFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;

            let filtered = staff.filter(s => {
                const matchSearch = s.name.toLowerCase().includes(searchTerm) || 
                                   s.specialty.toLowerCase().includes(searchTerm) ||
                                   s.role.toLowerCase().includes(searchTerm);
                const matchRole = roleFilter === 'all' || s.role === roleFilter;
                const matchStatus = statusFilter === 'all' || s.status === statusFilter;
                return matchSearch && matchRole && matchStatus;
            });

            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const paginated = filtered.slice(start, start + itemsPerPage);

            const grid = document.getElementById('staffGrid');
            if (paginated.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;"><i class="fas fa-user-slash" style="font-size:4rem;color:var(--gray);"></i><p>No se encontró personal</p></div>`;
            } else {
                grid.innerHTML = paginated.map(s => `
                    <div class="staff-card">
                        <div class="card-header-image">
                            <div class="staff-silhouette">
                                <i class="${getRoleIcon(s.role)}"></i>
                            </div>
                            <div class="staff-status ${s.status === 'active' ? 'status-active' : 'status-off'}"></div>
                        </div>
                        <div class="card-content">
                            <h3 class="staff-name">${s.name}</h3>
                            <div class="staff-role">${s.role}</div>
                            <div class="staff-info-row">
                                <div class="info-item"><i class="fas fa-calendar-alt"></i> Ingreso: ${s.hireDate}</div>
                                <div class="info-item"><i class="fas fa-phone"></i> ${s.phone}</div>
                            </div>
                            <div class="staff-specialty">
                                <i class="fas fa-star-of-life"></i>
                                <span><strong>Especialidad:</strong> ${s.specialty}</span>
                            </div>
                            <div class="card-actions">
                                <button class="btn-view" onclick="verDetalle(${s.id})"><i class="fas fa-eye"></i> Ver</button>
                                <button class="btn-edit" onclick="editarPersonal(${s.id})"><i class="fas fa-edit"></i> Editar</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            let buttons = '';
            for (let i = 1; i <= totalPages; i++) {
                buttons += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            document.getElementById('pagination').innerHTML = buttons;
        }

        function goToPage(page) { 
            currentPage = page; 
            renderStaff(); 
        }

        function verDetalle(id) {
            const person = staff.find(s => s.id === id);
            if (person) {
                alert(`📋 FICHA DEL PERSONAL\n\nNombre: ${person.name}\nCargo: ${person.role}\nEspecialidad: ${person.specialty}\nEstado: ${person.status === 'active' ? 'Activo' : 'Fuera de servicio'}\nFecha ingreso: ${person.hireDate}\nTeléfono: ${person.phone}\nEmail: ${person.email}`);
            }
        }

        function editarPersonal(id) {
            const person = staff.find(s => s.id === id);
            if (person) {
                editingStaffId = id;
                document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-edit"></i> Editar Personal';
                document.getElementById('modalName').value = person.name;
                document.getElementById('modalRole').value = person.role;
                document.getElementById('modalSpecialty').value = person.specialty;
                document.getElementById('modalStatus').value = person.status;
                document.getElementById('staffModal').classList.add('active');
            }
        }

        function guardarPersonal() {
            const name = document.getElementById('modalName').value.trim();
            const role = document.getElementById('modalRole').value;
            const specialty = document.getElementById('modalSpecialty').value.trim();
            const status = document.getElementById('modalStatus').value;

            if (!name) {
                alert('Por favor complete el nombre del personal.');
                return;
            }

            if (editingStaffId) {
                // Editar personal existente
                const index = staff.findIndex(s => s.id === editingStaffId);
                if (index !== -1) {
                    staff[index] = {
                        ...staff[index],
                        name,
                        role,
                        specialty: specialty || 'Sin especialidad asignada',
                        status
                    };
                }
                editingStaffId = null;
            } else {
                // Crear nuevo personal
                const newId = Math.max(...staff.map(s => s.id), 0) + 1;
                const today = new Date().toISOString().slice(0, 10);
                staff.push({
                    id: newId,
                    name,
                    role,
                    specialty: specialty || 'Sin especialidad asignada',
                    status,
                    hireDate: today,
                    phone: '555-0000',
                    email: `${name.toLowerCase().replace(/\s/g, '.')}@stfiacre.ls`
                });
            }

            // Reset modal
            document.getElementById('staffModal').classList.remove('active');
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus"></i> Nuevo Personal';
            document.getElementById('modalName').value = '';
            document.getElementById('modalRole').value = 'Médico';
            document.getElementById('modalSpecialty').value = '';
            document.getElementById('modalStatus').value = 'active';
            
            renderStaff();
            showNotification(editingStaffId ? 'Personal actualizado correctamente' : 'Personal agregado correctamente', 'success');
        }

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${type === 'success' ? 'var(--secondary)' : 'var(--primary)'};
                color: white;
                padding: 12px 24px;
                border-radius: 50px;
                font-size: 0.9rem;
                font-weight: 500;
                z-index: 9999;
                animation: slideInRight 0.3s ease;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            `;
            notification.innerHTML = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOutRight 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        const notificationStyle = document.createElement('style');
        notificationStyle.textContent = `
            @keyframes slideInRight {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOutRight {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(notificationStyle);

        // Eventos y menús
        const userMenu = document.getElementById('userMenu');
        document.getElementById('userBtn').addEventListener('click', (e) => { e.stopPropagation(); userMenu.classList.toggle('active'); });
        document.addEventListener('click', () => userMenu.classList.remove('active'));
        
        const mobileBtn = document.getElementById('mobileMenuBtn');
        const navLinks = document.getElementById('navLinks');
        mobileBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            mobileBtn.innerHTML = navLinks.classList.contains('active') ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
        });
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('sams_user');
            sessionStorage.removeItem('sams_user');
            window.location.href = 'login.html';
        });

        // Filtros y búsqueda
        document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; renderStaff(); });
        document.getElementById('roleFilter').addEventListener('change', () => { currentPage = 1; renderStaff(); });
        document.getElementById('statusFilter').addEventListener('change', () => { currentPage = 1; renderStaff(); });

        // Modal events
        const modal = document.getElementById('staffModal');
        const newStaffBtn = document.getElementById('newStaffBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const saveStaffBtn = document.getElementById('saveStaffBtn');

        newStaffBtn.addEventListener('click', () => {
            editingStaffId = null;
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus"></i> Nuevo Personal';
            document.getElementById('modalName').value = '';
            document.getElementById('modalRole').value = 'Médico';
            document.getElementById('modalSpecialty').value = '';
            document.getElementById('modalStatus').value = 'active';
            modal.classList.add('active');
        });

        closeModalBtn.addEventListener('click', () => {
            modal.classList.remove('active');
            editingStaffId = null;
        });

        saveStaffBtn.addEventListener('click', guardarPersonal);

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                editingStaffId = null;
            }
        });

        // Exponer funciones globalmente
        window.verDetalle = verDetalle;
        window.editarPersonal = editarPersonal;
        window.goToPage = goToPage;

        getUserData();
        renderStaff();
    </script>
</body>
</html>
