<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ST. Fiacre Hospital | Gestión de Pacientes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de gestión de pacientes del ST. Fiacre Hospital">

    <!-- Fuentes modernas -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Variables CSS - Misma paleta que el index */
        :root {
            --primary: #2D9CDB;
            --secondary: #27AE60;
            --accent: #EB5757;
            --light: #F8F9FA;
            --light-blue: #E3F2FD;
            --light-green: #E8F5E9;
            --dark: #2C3E50;
            --gray: #95A5A6;
            --border-radius: 16px;
            --border-radius-sm: 12px;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 15px 40px rgba(0, 0, 0, 0.12);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--light);
            color: var(--dark);
            overflow-x: hidden;
        }

        /* ==================== NAVBAR MODERNA ==================== */
        .navbar {
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0 20px;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 0;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            text-decoration: none;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo i {
            font-size: 1.8rem;
        }

        .nav-links {
            display: flex;
            gap: 5px;
        }

        .nav-links a {
            padding: 10px 18px;
            font-weight: 500;
            color: var(--dark);
            border-radius: 50px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .nav-links a i {
            font-size: 1rem;
        }

        .nav-links a:hover {
            background: var(--light-blue);
            color: var(--primary);
        }

        .nav-links a.active {
            background: var(--light-blue);
            color: var(--primary);
            font-weight: 600;
        }

        .user-menu {
            position: relative;
        }

        .user-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--light);
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-family: inherit;
        }

        .user-btn:hover {
            background: var(--light-blue);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .user-info {
            text-align: right;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--dark);
        }

        .user-role {
            font-size: 0.7rem;
            color: var(--gray);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 10px;
            background: white;
            border-radius: var(--border-radius-sm);
            box-shadow: var(--shadow-hover);
            min-width: 220px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: var(--transition);
            z-index: 1000;
        }

        .user-menu.active .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--dark);
            text-decoration: none;
            transition: var(--transition);
            border-bottom: 1px solid #eee;
        }

        .dropdown-menu a:last-child {
            border-bottom: none;
        }

        .dropdown-menu a:hover {
            background: var(--light-blue);
            color: var(--primary);
        }

        .dropdown-menu a i {
            width: 20px;
            color: var(--primary);
        }

        .dropdown-divider {
            height: 1px;
            background: #eee;
            margin: 5px 0;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--primary);
            cursor: pointer;
            transition: var(--transition);
        }

        .mobile-menu-btn:hover {
            transform: rotate(90deg);
        }

        /* ==================== CONTENIDO PRINCIPAL ==================== */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 1.8rem;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-header h1 i {
            color: var(--primary);
        }

        .page-header p {
            color: var(--gray);
            margin-top: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(45, 156, 219, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .filters-section {
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-family: inherit;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .filter-group {
            display: flex;
            gap: 10px;
        }

        .filter-select {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-family: inherit;
            background: white;
            cursor: pointer;
        }

        .patients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .patient-card {
            background: white;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            cursor: pointer;
        }

        .patient-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .card-header-image {
            height: 140px;
            background: linear-gradient(135deg, var(--light-blue), #fff);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Silueta única para todos los pacientes */
        .patient-silhouette {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .patient-silhouette i {
            font-size: 3.2rem;
            color: white;
        }

        .card-content {
            padding: 20px;
        }

        .patient-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 12px;
        }

        .patient-info-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--gray);
        }

        .info-item i {
            color: var(--primary);
            width: 16px;
        }

        .doctor-info {
            background: var(--light-blue);
            padding: 10px 12px;
            border-radius: var(--border-radius-sm);
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }

        .doctor-info i {
            color: var(--primary);
            font-size: 1rem;
        }

        .doctor-name {
            font-weight: 600;
            color: var(--dark);
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }

        .card-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-view {
            background: var(--light-blue);
            color: var(--primary);
        }
        .btn-view:hover { background: var(--primary); color: white; }
        .btn-edit { background: #f0f0f0; color: var(--gray); }
        .btn-edit:hover { background: var(--secondary); color: white; }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: white;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }

        .page-btn:hover {
            background: var(--light-blue);
        }

        .page-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .footer {
            background: white;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #e0e0e0;
            margin-top: 40px;
        }

        .footer p {
            font-size: 0.8rem;
            color: var(--gray);
        }

        /* Modal para nuevo/editar paciente */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: var(--border-radius);
            max-width: 500px;
            width: 90%;
            padding: 30px;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content h3 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--dark);
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: var(--border-radius-sm);
            font-family: inherit;
            transition: var(--transition);
        }

        .modal-content input:focus,
        .modal-content select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn { display: block; }
            .nav-links {
                position: fixed;
                top: 70px;
                left: 0;
                right: 0;
                background: white;
                flex-direction: column;
                padding: 20px;
                transform: translateY(-100%);
                opacity: 0;
                visibility: hidden;
                transition: var(--transition);
                z-index: 999;
            }
            .nav-links.active {
                transform: translateY(0);
                opacity: 1;
                visibility: visible;
            }
            .filters-section { flex-direction: column; align-items: stretch; }
            .filter-group { justify-content: space-between; }
            .filter-select { flex: 1; }
            .patients-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="dashboard.html" class="logo"><i class="fas fa-heartbeat"></i> ST. Fiacre</a>
            <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
            <div class="nav-links" id="navLinks">
                <a href="dashboard.html"><i class="fas fa-home"></i> Inicio</a>
                <a href="pacientes.html" class="active"><i class="fas fa-users"></i> Pacientes</a>
                <a href="turnos.html"><i class="fas fa-calendar-alt"></i> Turnos</a>
                <a href="personal.html"><i class="fas fa-user-md"></i> Personal</a>
                <a href="comunicados.html"><i class="fas fa-bullhorn"></i> Comunicados</a>
                <a href="reportes.html"><i class="fas fa-chart-line"></i> Reportes</a>
            </div>
            <div class="user-menu" id="userMenu">
                <button class="user-btn" id="userBtn">
                    <div class="user-avatar" id="userAvatar"><i class="fas fa-user-md"></i></div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Dr. Martínez</div>
                        <div class="user-role" id="userRole">Médico de Emergencias</div>
                    </div>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="dropdown-menu">
                    <a href="perfil.html"><i class="fas fa-user"></i> Mi Perfil</a>
                    <a href="configuracion.html"><i class="fas fa-cog"></i> Configuración</a>
                    <div class="dropdown-divider"></div>
                    <a href="login.html" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1><i class="fas fa-hospital-user"></i> Gestión de Pacientes</h1>
                <p>Historial clínico completo de todos los pacientes</p>
            </div>
            <button class="btn-primary" id="newPatientBtn"><i class="fas fa-plus-circle"></i> Nuevo Paciente</button>
        </div>

        <div class="filters-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar por nombre o médico...">
            </div>
            <div class="filter-group">
                <select class="filter-select" id="doctorFilter">
                    <option value="all">Todos los médicos</option>
                    <option value="Dr. Martínez">Dr. Martínez</option>
                    <option value="Dra. López">Dra. López</option>
                    <option value="Dr. Rodríguez">Dr. Rodríguez</option>
                    <option value="Dra. García">Dra. García</option>
                </select>
            </div>
        </div>

        <div class="patients-grid" id="patientsGrid"></div>
        <div class="pagination" id="pagination"></div>
    </main>

    <footer class="footer">
        <p><i class="fas fa-heartbeat" style="color: var(--primary);"></i> ST. Fiacre Hospital - Sistema de Gestión Médica v2.0</p>
    </footer>

    <!-- Modal para nuevo/editar paciente -->
    <div class="modal" id="patientModal">
        <div class="modal-content">
            <h3 id="modalTitle"><i class="fas fa-user-plus"></i> Nuevo Paciente</h3>
            <input type="text" id="modalName" placeholder="Nombre completo" required>
            <input type="number" id="modalAge" placeholder="Edad" required>
            <select id="modalDoctor">
                <option value="Dr. Martínez">Dr. Martínez</option>
                <option value="Dra. López">Dra. López</option>
                <option value="Dr. Rodríguez">Dr. Rodríguez</option>
                <option value="Dra. García">Dra. García</option>
            </select>
            <div class="modal-buttons">
                <button class="btn-outline" id="closeModalBtn">Cancelar</button>
                <button class="btn-primary" id="savePatientBtn">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        // Datos de pacientes
        let patients = [
            { id: 1, name: 'Michael De Santa', age: 45, admissionDate: '2024-03-15', doctor: 'Dr. Martínez' },
            { id: 2, name: 'Franklin Clinton', age: 28, admissionDate: '2024-03-18', doctor: 'Dra. López' },
            { id: 3, name: 'Trevor Philips', age: 49, admissionDate: '2024-03-20', doctor: 'Dr. Rodríguez' },
            { id: 4, name: 'Amanda De Santa', age: 42, admissionDate: '2024-03-14', doctor: 'Dra. García' },
            { id: 5, name: 'Sofia Martinez', age: 7, admissionDate: '2024-03-19', doctor: 'Dr. Martínez' },
            { id: 6, name: 'Lester Crest', age: 55, admissionDate: '2024-03-10', doctor: 'Dr. Martínez' },
            { id: 7, name: 'Tracey De Santa', age: 21, admissionDate: '2024-03-16', doctor: 'Dra. López' },
            { id: 8, name: 'Jimmy De Santa', age: 18, admissionDate: '2024-03-17', doctor: 'Dr. Martínez' }
        ];

        let currentPage = 1;
        let editingPatientId = null;
        const itemsPerPage = 6;

        function getUserData() {
            const savedUser = localStorage.getItem('sams_user') || sessionStorage.getItem('sams_user');
            if (savedUser) {
                try {
                    const user = JSON.parse(savedUser);
                    document.getElementById('userName').textContent = user.name;
                    document.getElementById('userRole').textContent = user.role;
                } catch(e) {}
            }
        }

        function renderPatients() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const doctorFilter = document.getElementById('doctorFilter').value;

            let filtered = patients.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(searchTerm) || 
                                   p.doctor.toLowerCase().includes(searchTerm);
                const matchDoctor = doctorFilter === 'all' || p.doctor === doctorFilter;
                return matchSearch && matchDoctor;
            });

            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const paginated = filtered.slice(start, start + itemsPerPage);

            const grid = document.getElementById('patientsGrid');
            if (paginated.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;"><i class="fas fa-user-slash" style="font-size:4rem;color:var(--gray);"></i><p>No se encontraron pacientes</p></div>`;
            } else {
                grid.innerHTML = paginated.map(p => `
                    <div class="patient-card">
                        <div class="card-header-image">
                            <div class="patient-silhouette">
                                <i class="fas fa-user-circle"></i>
                            </div>
                        </div>
                        <div class="card-content">
                            <h3 class="patient-name">${p.name}</h3>
                            <div class="patient-info-row">
                                <div class="info-item"><i class="fas fa-calendar-alt"></i> ${p.age} años</div>
                                <div class="info-item"><i class="fas fa-calendar-plus"></i> Ingreso: ${p.admissionDate}</div>
                            </div>
                            <div class="doctor-info">
                                <i class="fas fa-user-md"></i>
                                <span class="doctor-name">Médico: ${p.doctor}</span>
                            </div>
                            <div class="card-actions">
                                <button class="btn-view" onclick="verHistoriaClinica(${p.id})"><i class="fas fa-notes-medical"></i> Historia Clínica</button>
                                <button class="btn-edit" onclick="editarPaciente(${p.id})"><i class="fas fa-edit"></i> Editar</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            let buttons = '';
            for (let i = 1; i <= totalPages; i++) {
                buttons += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            document.getElementById('pagination').innerHTML = buttons;
        }

        function goToPage(page) { 
            currentPage = page; 
            renderPatients(); 
        }
        
        function verHistoriaClinica(id) {
            window.location.href = `historia_clinica.html?id=${id}`;
        }

        function editarPaciente(id) {
            const patient = patients.find(p => p.id === id);
            if (patient) {
                editingPatientId = id;
                document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-edit"></i> Editar Paciente';
                document.getElementById('modalName').value = patient.name;
                document.getElementById('modalAge').value = patient.age;
                document.getElementById('modalDoctor').value = patient.doctor;
                document.getElementById('patientModal').classList.add('active');
            }
        }

        function guardarPaciente() {
            const name = document.getElementById('modalName').value.trim();
            const age = parseInt(document.getElementById('modalAge').value);
            const doctor = document.getElementById('modalDoctor').value;

            if (!name || !age) {
                alert('Por favor complete todos los campos obligatorios.');
                return;
            }

            if (editingPatientId) {
                // Editar paciente existente
                const index = patients.findIndex(p => p.id === editingPatientId);
                if (index !== -1) {
                    patients[index] = {
                        ...patients[index],
                        name,
                        age,
                        doctor
                    };
                }
                editingPatientId = null;
            } else {
                // Crear nuevo paciente
                const newId = Math.max(...patients.map(p => p.id), 0) + 1;
                const today = new Date().toISOString().slice(0, 10);
                patients.push({
                    id: newId,
                    name,
                    age,
                    admissionDate: today,
                    doctor
                });
            }

            // Reset modal
            document.getElementById('patientModal').classList.remove('active');
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus"></i> Nuevo Paciente';
            document.getElementById('modalName').value = '';
            document.getElementById('modalAge').value = '';
            document.getElementById('modalDoctor').value = 'Dr. Martínez';
            
            renderPatients();
        }

        // Eventos y menús
        const userMenu = document.getElementById('userMenu');
        document.getElementById('userBtn').addEventListener('click', (e) => { e.stopPropagation(); userMenu.classList.toggle('active'); });
        document.addEventListener('click', () => userMenu.classList.remove('active'));
        
        const mobileBtn = document.getElementById('mobileMenuBtn');
        const navLinks = document.getElementById('navLinks');
        mobileBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            mobileBtn.innerHTML = navLinks.classList.contains('active') ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
        });
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('sams_user');
            sessionStorage.removeItem('sams_user');
            window.location.href = 'login.html';
        });

        // Filtros y búsqueda
        document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; renderPatients(); });
        document.getElementById('doctorFilter').addEventListener('change', () => { currentPage = 1; renderPatients(); });

        // Modal events
        const modal = document.getElementById('patientModal');
        const newPatientBtn = document.getElementById('newPatientBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const savePatientBtn = document.getElementById('savePatientBtn');

        newPatientBtn.addEventListener('click', () => {
            editingPatientId = null;
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus"></i> Nuevo Paciente';
            document.getElementById('modalName').value = '';
            document.getElementById('modalAge').value = '';
            document.getElementById('modalDoctor').value = 'Dr. Martínez';
            modal.classList.add('active');
        });

        closeModalBtn.addEventListener('click', () => {
            modal.classList.remove('active');
            editingPatientId = null;
        });

        savePatientBtn.addEventListener('click', guardarPaciente);

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                editingPatientId = null;
            }
        });

        getUserData();
        renderPatients();
    </script>
</body>
</html>
